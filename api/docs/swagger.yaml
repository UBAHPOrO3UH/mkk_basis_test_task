definitions:
  mkk_basis_rest_api_internal_app_core_entities_auth-entities.AuthResponse:
    properties:
      access_expires_at:
        type: string
      refresh_expires_at:
        type: string
      user:
        $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
    type: object
  mkk_basis_rest_api_internal_app_core_entities_auth-entities.LoginRequest:
    properties:
      password:
        maxLength: 255
        type: string
      username:
        maxLength: 255
        type: string
    required:
    - password
    - username
    type: object
  mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskHistoryResponse:
    properties:
      changed_at:
        type: string
      changed_by:
        type: integer
      field_name:
        type: string
      id:
        type: integer
      new_value:
        type: string
      old_value:
        type: string
      task_id:
        type: integer
    type: object
  mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskRequest:
    properties:
      assignee_id:
        type: integer
      description:
        type: string
      status:
        enum:
        - todo
        - in_progress
        - done
        type: string
      team_id:
        type: integer
      title:
        maxLength: 255
        type: string
    type: object
  mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskResponse:
    properties:
      assignee_id:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      created_by:
        type: integer
      description:
        type: string
      id:
        type: integer
      status:
        type: string
      team_id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  mkk_basis_rest_api_internal_app_core_entities_teams-entities.CreateTeamRequest:
    properties:
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  mkk_basis_rest_api_internal_app_core_entities_teams-entities.InviteUserRequest:
    properties:
      role:
        enum:
        - admin
        - member
        type: string
      user_id:
        type: integer
    required:
    - user_id
    type: object
  mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamMemberResponse:
    properties:
      joined_at:
        type: string
      role:
        type: string
      team_id:
        type: integer
      user_id:
        type: integer
    type: object
  mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: integer
      joined_at:
        type: string
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamStatsResponse:
    properties:
      done_tasks_last_seven_days:
        type: integer
      id:
        type: integer
      member_count:
        type: integer
      name:
        type: string
    type: object
  mkk_basis_rest_api_internal_app_core_entities_users-entities.TeamTopTaskCreatorResponse:
    properties:
      task_count:
        type: integer
      team:
        $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamResponse'
      user:
        $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
    type: object
  mkk_basis_rest_api_internal_app_core_entities_users-entities.UserRequest:
    properties:
      name:
        maxLength: 255
        type: string
      password:
        maxLength: 255
        type: string
      username:
        maxLength: 255
        type: string
    required:
    - name
    - username
    type: object
  mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  mkk_basis_rest_api_internal_common.APIResponse:
    properties:
      err:
        type: string
      result: {}
    type: object
info:
  contact: {}
  title: rest-API
  version: "1.0"
paths:
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Аутентификация; JWT устанавливаются в HttpOnly cookies
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_auth-entities.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_auth-entities.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
      summary: Login
      tags:
      - auth
  /api/v1/register:
    post:
      consumes:
      - application/json
      description: Регистрация нового пользователя
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
      summary: Register
      tags:
      - auth
  /api/v1/tasks:
    get:
      description: Получить задачи команды с фильтрацией и пагинацией
      parameters:
      - in: query
        name: assignee_id
        type: integer
      - in: query
        maximum: 100
        name: limit
        type: integer
      - in: query
        name: shift
        type: integer
      - enum:
        - todo
        - in_progress
        - done
        in: query
        name: status
        type: string
      - in: query
        name: team_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskResponse'
                  type: array
              type: object
      summary: Get tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Создать задачу в команде
      parameters:
      - description: Task data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskResponse'
              type: object
      summary: Create task
      tags:
      - tasks
  /api/v1/tasks/{id}:
    put:
      consumes:
      - application/json
      description: Обновить задачу
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskResponse'
              type: object
      summary: Update task
      tags:
      - tasks
  /api/v1/tasks/{id}/history:
    get:
      description: Получить историю изменений задачи
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskHistoryResponse'
                  type: array
              type: object
      summary: Get task history
      tags:
      - tasks
  /api/v1/tasks/integrity/invalid-assignees:
    get:
      description: Найти задачи, где назначенный пользователь не является участником
        команды задачи
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_tasks-entities.TaskResponse'
                  type: array
              type: object
      summary: Find tasks with invalid assignees
      tags:
      - tasks
  /api/v1/teams:
    get:
      description: Получить команды, в которых состоит текущий пользователь
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamResponse'
                  type: array
              type: object
      summary: Get user's teams
      tags:
      - teams
    post:
      consumes:
      - application/json
      description: Создать команду; текущий пользователь становится owner
      parameters:
      - description: Team data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.CreateTeamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamResponse'
              type: object
      summary: Create team
      tags:
      - teams
  /api/v1/teams/{id}/invite:
    post:
      consumes:
      - application/json
      description: Добавить пользователя в команду; доступно owner и admin
      parameters:
      - description: Team ID
        in: path
        name: id
        required: true
        type: integer
      - description: Invitation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.InviteUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamMemberResponse'
              type: object
      summary: Invite user to team
      tags:
      - teams
  /api/v1/teams/stats:
    get:
      description: Получить для каждой команды количество участников и выполненных
        за последние 7 дней задач
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_teams-entities.TeamStatsResponse'
                  type: array
              type: object
      summary: Get team stats
      tags:
      - teams
  /api/v1/users:
    get:
      consumes:
      - application/json
      description: Получить список пользователей без фильтра
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
                  type: array
              type: object
      summary: Get users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Создание пользователя
      parameters:
      - description: User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
              type: object
      summary: Create user
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      consumes:
      - application/json
      description: Удалить пользователя по ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  format: int64
                  type: integer
              type: object
      summary: Delete user by id
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Получить пользователя по ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
              type: object
      summary: Get user by id
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Обновление пользователя
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
              type: object
      summary: Update user
      tags:
      - users
  /api/v1/users/by-username:
    get:
      consumes:
      - application/json
      description: Получить пользователя по username
      parameters:
      - description: User username
        in: query
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
              type: object
      summary: Get user by username
      tags:
      - users
  /api/v1/users/filter:
    get:
      consumes:
      - application/json
      description: Получить список пользователей с фильтрацией и пагинацией
      parameters:
      - in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - in: query
        maxLength: 255
        name: name
        type: string
      - in: query
        minimum: 0
        name: shift
        type: integer
      - in: query
        maxLength: 255
        name: username
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.UserResponse'
                  type: array
              type: object
      summary: Get users with filter
      tags:
      - users
  /api/v1/users/top-task-creators:
    get:
      description: Получить топ-3 пользователей по количеству созданных задач в каждой
        команде за указанный месяц
      parameters:
      - description: Month in YYYY-MM format
        in: query
        name: month
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/mkk_basis_rest_api_internal_common.APIResponse'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/mkk_basis_rest_api_internal_app_core_entities_users-entities.TeamTopTaskCreatorResponse'
                  type: array
              type: object
      summary: Get top task creators by team
      tags:
      - users
swagger: "2.0"
