services:
  mysql:
    image: mysql:8.0
    container_name: mkk_basis_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mkk_basis_tasks
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      TZ: Europe/Moscow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mkk_basis_network

  redis:
    image: redis:7-alpine
    container_name: mkk_basis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mkk_basis_network

  redis-ui:
    image: patrikx3/p3x-redis-ui:latest
    container_name: mkk_basis_redis_ui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7843:7843"
    volumes:
      - redis_ui_settings:/settings
    networks:
      - mkk_basis_network

volumes:
  mysql_data:
  redis_data:
  redis_ui_settings:

networks:
  mkk_basis_network:
    driver: bridge